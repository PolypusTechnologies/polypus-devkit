<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polypus Master Dev Kit</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@300;400;500&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:#232430; --blue:#1BA2D2; --blue-dark:#0477AE; --blue-lt:#d6f0f9;
  --pink:#E4067D; --purple:#766A86; --bg:#EAF2FB;
  --surface:#dbeaf6; --border:#c8dff0; --white:#fff;
  --green:#0a7040; --amber:#b45000; --red:#b52a1c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Instrument Sans',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
.mono{font-family:'JetBrains Mono',monospace}
.syne{font-family:'Syne',sans-serif}

/* HEADER */
.hdr{background:var(--ink);position:sticky;top:0;z-index:1000;padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(27,162,210,.2)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;background:linear-gradient(135deg,#1BA2D2,#E4067D);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:rgba(255,255,255,.35);display:flex;gap:20px;align-items:center}
.hdr-meta strong{color:#1BA2D2;font-size:14px;font-weight:700}
.hdr-meta .pink{color:#E4067D}
.kbd{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:3px;padding:1px 5px;color:rgba(255,255,255,.7)}

/* SIDEBAR */
.layout{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:220px;background:var(--ink);flex-shrink:0;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto;padding:16px 0}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.s-section{padding:10px 16px 4px;font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.25)}
.s-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;color:rgba(255,255,255,.5);font-size:12px;transition:all .15s;border-left:2px solid transparent;background:none;border-top:none;border-right:none;border-bottom:none;width:100%;text-align:left;font-family:inherit}
.s-item:hover{color:white;background:rgba(255,255,255,.04)}
.s-item.active{color:#1BA2D2;border-left-color:#1BA2D2;background:rgba(27,162,210,.07)}
.s-item:focus-visible{outline:2px solid #1BA2D2;outline-offset:-2px}
.s-count{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;background:rgba(255,255,255,.08);padding:1px 6px;border-radius:8px;color:rgba(255,255,255,.4)}

/* MAIN */
.main{flex:1;padding:28px 32px;overflow-x:hidden}

/* SEARCH */
.search-bar{display:flex;gap:10px;margin-bottom:14px}
.search-input{flex:1;font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--white);border:1px solid var(--border);border-radius:8px;padding:10px 16px;outline:none;transition:border .15s}
.search-input:focus{border-color:var(--blue)}
.search-input::placeholder{color:var(--purple)}
.btn-dark{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--ink);color:white;border:none;padding:10px 18px;border-radius:8px;cursor:pointer;white-space:nowrap}
.btn-dark:hover{background:#3a3b4a}

/* PROJECT CHIPS */
.chips{display:flex;gap:6px;margin-bottom:22px;flex-wrap:wrap}
.chip{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--white);border:1px solid var(--border);color:var(--purple);padding:5px 11px;border-radius:20px;cursor:pointer;transition:all .15s}
.chip:hover{border-color:var(--blue);color:var(--blue-dark)}
.chip.active{background:var(--ink);color:white;border-color:var(--ink)}
.chip.fav{color:var(--amber)}
.chip.fav.active{background:var(--amber);color:white;border-color:var(--amber)}

/* GRID */
.lib-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.lib-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px;position:relative;transition:all .2s;cursor:default}
.lib-card:hover{border-color:var(--blue);box-shadow:0 2px 12px rgba(27,162,210,.12);transform:translateY(-1px)}
.lib-name{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-bottom:3px}
.lib-desc{font-size:11px;color:var(--purple);line-height:1.5;margin-bottom:8px}
.lib-use{font-size:11px;color:var(--ink);margin-bottom:8px;line-height:1.4}
.lib-cdn{font-family:'JetBrains Mono',monospace;font-size:9px;background:#0f0f1a;color:#88c0d0;padding:7px 10px;border-radius:5px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .15s}
.lib-cdn:hover{background:#1a1a2e}
.tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px;font-weight:600;letter-spacing:.04em;margin-right:4px;margin-bottom:6px}
.proj-tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 7px;border-radius:3px;font-weight:600;letter-spacing:.04em;margin-right:4px;margin-bottom:6px;background:var(--ink);color:white}
.copy-btn{position:absolute;top:10px;right:40px;font-family:'JetBrains Mono',monospace;font-size:9px;background:var(--surface);border:1px solid var(--border);color:var(--purple);padding:3px 8px;border-radius:4px;cursor:pointer;transition:all .15s}
.copy-btn:hover{background:var(--blue);color:white;border-color:var(--blue)}
.fav-btn{position:absolute;top:10px;right:10px;font-size:16px;background:none;border:none;cursor:pointer;line-height:1;color:var(--border);padding:2px;transition:all .15s}
.fav-btn:hover{transform:scale(1.2)}
.fav-btn.starred{color:var(--amber)}

/* PYTHON SECTION */
.py-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px}
.py-pkg{background:var(--white);border:1px solid var(--border);border-radius:7px;padding:11px 13px;display:flex;flex-direction:column;gap:3px;cursor:pointer;transition:all .15s;position:relative}
.py-pkg:hover{border-color:var(--blue);background:#f0f8fd}
.py-pkg-name{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;color:var(--ink)}
.py-pkg-desc{font-size:11px;color:var(--purple);line-height:1.4}
.py-install{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--blue-dark)}
.py-pkg .fav-btn{top:6px;right:6px;font-size:13px}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:white;font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 16px;border-radius:7px;z-index:9999;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;border-left:3px solid var(--blue)}
.toast.show{opacity:1;transform:translateY(0)}

/* PIP SCRIPT */
.pip-block{background:#0f0f1a;border-radius:10px;padding:20px;font-family:'JetBrains Mono',monospace;font-size:11px;color:#88c0d0;line-height:1.8;position:relative;overflow-x:auto;margin-bottom:24px;white-space:pre-wrap;word-break:break-all}

/* SECTION HEADER */
.sec-hdr{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.sec-hdr-title{font-family:'Syne',sans-serif;font-weight:700;font-size:20px}
.sec-hdr-count{font-family:'JetBrains Mono',monospace;font-size:11px;background:var(--surface);border:1px solid var(--border);padding:3px 10px;border-radius:20px;color:var(--purple)}
.sec-hdr-meta{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--purple)}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="logo">Polypus Master Dev Kit</div>
  <div class="hdr-meta">
    <span><strong id="total-count">0</strong> libraries &amp; packages</span>
    <span><strong class="pink" id="cat-count">15</strong> categories</span>
    <span><span class="kbd">/</span> search · <span class="kbd">Esc</span> clear</span>
  </div>
</div>

<div class="layout">

<!-- SIDEBAR -->
<nav class="sidebar" id="sidebar">
  <div class="s-section">Frontend JS</div>

  <button class="s-item" data-section="charts" type="button">📊 Charts &amp; Dataviz<span class="s-count" id="sc-charts">0</span></button>
  <button class="s-item" data-section="3d" type="button">🧊 3D &amp; Canvas<span class="s-count" id="sc-3d">0</span></button>
  <button class="s-item" data-section="ui" type="button">🎨 UI Components<span class="s-count" id="sc-ui">0</span></button>
  <button class="s-item" data-section="maps" type="button">🗺 Maps &amp; Geo<span class="s-count" id="sc-maps">0</span></button>
  <button class="s-item" data-section="media" type="button">🎵 Audio &amp; Video<span class="s-count" id="sc-media">0</span></button>
  <button class="s-item" data-section="utility" type="button">🔧 Utilities<span class="s-count" id="sc-utility">0</span></button>
  <button class="s-item" data-section="realtime" type="button">⚡ Realtime<span class="s-count" id="sc-realtime">0</span></button>
  <div class="s-section">Python</div>
  <button class="s-item" data-section="py-ai" type="button">🤖 AI &amp; LLM<span class="s-count" id="sc-py-ai">0</span></button>
  <button class="s-item" data-section="py-data" type="button">📈 Data &amp; ML<span class="s-count" id="sc-py-data">0</span></button>
  <button class="s-item" data-section="py-web" type="button">🕷 Scraping &amp; Web<span class="s-count" id="sc-py-web">0</span></button>
  <button class="s-item" data-section="py-backend" type="button">⚙️ Backend &amp; APIs<span class="s-count" id="sc-py-backend">0</span></button>
  <button class="s-item" data-section="py-finance" type="button">💹 Finance &amp; Trading<span class="s-count" id="sc-py-finance">0</span></button>
  <button class="s-item" data-section="py-docs" type="button">📄 Documents<span class="s-count" id="sc-py-docs">0</span></button>
  <button class="s-item" data-section="py-util" type="button">🛠 Python Utils<span class="s-count" id="sc-py-util">0</span></button>
  <div class="s-section">Install Scripts</div>
  <button class="s-item" data-section="install-py" type="button">📦 Full pip install</button>
  <button class="s-item" data-section="install-node" type="button">📦 Node globals</button>
  <button class="s-item" data-section="install-bundle" type="button">📦 JS CDN bundle</button>
</nav>

<!-- MAIN -->
<main class="main">

  <div class="search-bar">
    <input class="search-input" id="search" placeholder="Search any library or package...    /  to focus  ·  Esc  to clear" oninput="searchLibs(this.value)" autocomplete="off">
    <button class="btn-dark" onclick="copyAllPip()">Copy pip install all</button>
    <button class="btn-pink" id="exportOpen" type="button">Export for Claude</button>
  </div>

  <!-- PROJECT FILTER CHIPS -->
  <div class="chips" id="chips">
    <button class="chip active" data-proj="all">All</button>
    <button class="chip fav" data-proj="fav">★ Favorites</button>
    <button class="chip" data-proj="SAGE">SAGE</button>
    <button class="chip" data-proj="MIRROR">MIRROR</button>
    <button class="chip" data-proj="ATLAS">ATLAS</button>
    <button class="chip" data-proj="STUDIO">STUDIO</button>
  </div>

  <div id="content"></div>

</main>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
// ═══════════════════════════════════════════════════════
//  PARSE DATA
// ═══════════════════════════════════════════════════════
const DATA = JSON.parse(document.getElementById('devkit-data').textContent);
const JS_LIBS = DATA.js;
const PY_PKGS = DATA.py;

const CAT_LABELS = {
  animation:'Animation', charts:'Charts & Dataviz', '3d':'3D & Canvas',
  ui:'UI Components', maps:'Maps & Geo', media:'Audio & Video',
  utility:'Utilities', realtime:'Realtime',
  'py-ai':'AI & LLM', 'py-data':'Data & ML', 'py-web':'Scraping & Web',
  'py-backend':'Backend & APIs', 'py-finance':'Finance & Trading',
  'py-docs':'Documents', 'py-util':'Python Utils'
};
const CAT_COLORS = {
  animation:'#1BA2D2', charts:'#E4067D', '3d':'#766A86',
  ui:'#0477AE', maps:'#0a7040', media:'#b45000',
  utility:'#232430', realtime:'#b52a1c',
  'py-ai':'#7c3aed', 'py-data':'#1BA2D2', 'py-web':'#E4067D',
  'py-backend':'#0477AE', 'py-finance':'#0a7040',
  'py-docs':'#b45000', 'py-util':'#766A86'
};

// ═══════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════
let currentSection = 'animation';
let currentProject = 'all';
const FAV_KEY = 'polypus_devkit_favs_v1';
const favs = new Set(JSON.parse(localStorage.getItem(FAV_KEY) || '[]'));

function saveFavs(){ localStorage.setItem(FAV_KEY, JSON.stringify([...favs])); }
function favId(type, name){ return `${type}:${name}`; }

// ═══════════════════════════════════════════════════════
//  FILTERING
// ═══════════════════════════════════════════════════════
function filterByProject(items, type){
  if(currentProject === 'all') return items;
  if(currentProject === 'fav') return items.filter(i => favs.has(favId(type, i.name)));
  return items.filter(i => (i.projects||[]).includes(currentProject));
}

// ═══════════════════════════════════════════════════════
//  RENDERERS
// ═══════════════════════════════════════════════════════
function renderJS(sec){
  const all = JS_LIBS[sec] || [];
  const libs = filterByProject(all, 'js');
  const color = CAT_COLORS[sec] || '#1BA2D2';
  const title = CAT_LABELS[sec] || sec;
  document.getElementById('content').innerHTML = `
    <div class="sec-hdr">
      <div class="sec-hdr-title">${title}</div>
      <span class="sec-hdr-count">${libs.length}${libs.length !== all.length ? ` of ${all.length}` : ''} libraries</span>
      ${currentProject !== 'all' ? `<span class="sec-hdr-meta">Filter: ${currentProject === 'fav' ? '★ favorites' : currentProject}</span>` : ''}
    </div>
    ${libs.length ? `<div class="lib-grid">${libs.map((l,i) => jsCard(l, sec, color, i)).join('')}</div>` :
      `<div style="text-align:center;padding:48px;color:var(--purple)">No libraries match this filter.</div>`}
  `;
}

function jsCard(l, sec, color, i){
  const fid = favId('js', l.name);
  const starred = favs.has(fid);
  const projs = (l.projects || []).map(p => `<span class="proj-tag">${p}</span>`).join('');
  const tags = (l.tags || []).map(t => `<span class="tag" style="background:${color}18;color:${color}">${t}</span>`).join('');
  return `
    <div class="lib-card" style="animation:up .25s ${i*.025}s both">
      <button class="fav-btn ${starred?'starred':''}" data-fav="${fid}" title="Favorite">${starred?'★':'☆'}</button>
      <button class="copy-btn" data-copy-cdn="${encodeURIComponent(l.cdn)}" data-name="${l.name}">Copy CDN</button>
      <div class="lib-name">${l.name}</div>
      <div>${tags}${projs}</div>
      <div class="lib-desc">${l.desc}</div>
      <div class="lib-use"><strong style="color:${color}">Use for:</strong> ${l.use}</div>
      <div class="lib-cdn" data-copy-cdn="${encodeURIComponent(l.cdn)}" data-name="${l.name} CDN">${l.cdn || '(native browser API — no CDN)'}</div>
    </div>
  `;
}

function renderPY(sec){
  const all = PY_PKGS[sec] || [];
  const pkgs = filterByProject(all, 'py');
  const color = CAT_COLORS[sec] || '#7c3aed';
  const title = CAT_LABELS[sec] || sec;
  const pipList = pkgs.map(p => p.name).join(' ');
  document.getElementById('content').innerHTML = `
    <div class="sec-hdr">
      <div class="sec-hdr-title">${title}</div>
      <span class="sec-hdr-count">${pkgs.length}${pkgs.length !== all.length ? ` of ${all.length}` : ''} packages</span>
      ${currentProject !== 'all' ? `<span class="sec-hdr-meta">Filter: ${currentProject === 'fav' ? '★ favorites' : currentProject}</span>` : ''}
    </div>
    ${pkgs.length ? `
      <div style="background:#0f0f1a;border-radius:8px;padding:14px;font-family:'JetBrains Mono',monospace;font-size:11px;margin-bottom:16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="color:rgba(255,255,255,.3)">pip install</span>
        <span style="color:${color};word-break:break-word;flex:1;min-width:200px">${pipList}</span>
        <button data-copy="${encodeURIComponent('pip install ' + pipList)}" data-name="pip install command" style="font-family:'JetBrains Mono',monospace;font-size:9px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.6);padding:4px 10px;border-radius:4px;cursor:pointer">Copy pip install</button>
      </div>
      <div class="py-grid">${pkgs.map((p,i) => pyCard(p, sec, color, i)).join('')}</div>
    ` : `<div style="text-align:center;padding:48px;color:var(--purple)">No packages match this filter.</div>`}
  `;
}

function pyCard(p, sec, color, i){
  const fid = favId('py', p.name);
  const starred = favs.has(fid);
  const projs = (p.projects || []).map(pr => `<span class="proj-tag">${pr}</span>`).join(' ');
  return `
    <div class="py-pkg" data-copy="${encodeURIComponent('pip install ' + p.name)}" data-name="${p.name}" style="animation:up .2s ${i*.02}s both">
      <button class="fav-btn ${starred?'starred':''}" data-fav="${fid}" title="Favorite">${starred?'★':'☆'}</button>
      <div class="py-pkg-name">${p.name}</div>
      <div class="py-pkg-desc">${p.desc}</div>
      ${projs ? `<div style="margin-top:3px">${projs}</div>` : ''}
      <div class="py-install" style="color:${color}">→ ${p.use.substring(0,60)}${p.use.length>60?'...':''}</div>
    </div>
  `;
}

function renderInstallPy(){
  const allPy = Object.values(PY_PKGS).flat().map(p=>p.name);
  document.getElementById('content').innerHTML = `
    <div class="sec-hdr"><div class="sec-hdr-title">Full pip install script</div><span class="sec-hdr-count">${allPy.length} packages</span></div>
    <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
      Python — all packages (recommended: activate venv first)
      <button data-copy="${encodeURIComponent('pip install ' + allPy.join(' '))}" data-name="All Python packages" class="btn-dark" style="padding:6px 14px;font-size:10px">Copy pip install all</button>
    </div>
    <div class="pip-block">pip install ${allPy.join(' \\\n  ')}</div>
  `;
}

function renderInstallNode(){
  const cmd = 'npm install -g vercel netlify-cli serve http-server nodemon pm2 typescript ts-node vite @anthropic-ai/sdk prettier eslint concurrently dotenv-cli json-server localtunnel';
  document.getElementById('content').innerHTML = `
    <div class="sec-hdr"><div class="sec-hdr-title">Node globals</div></div>
    <div style="font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
      Node — global tools
      <button data-copy="${encodeURIComponent(cmd)}" data-name="Node globals" class="btn-dark" style="padding:6px 14px;font-size:10px">Copy npm install</button>
    </div>
    <div class="pip-block">${cmd.replace(/ /g, ' \\\n  ').replace('npm \\\n  install', 'npm install')}</div>
  `;
}

function renderInstallBundle(){
  const allJs = Object.values(JS_LIBS).flat()
    .filter(l => l.cdn && l.cdn.startsWith('http'))
    .map(l => `<!-- ${l.name} -->\n<script src="${l.cdn}"><\/script>`).join('\n');
  document.getElementById('content').innerHTML = `
    <div class="sec-hdr"><div class="sec-hdr-title">Full JS CDN bundle</div><span class="sec-hdr-count">${Object.values(JS_LIBS).flat().filter(l => l.cdn && l.cdn.startsWith('http')).length} scripts</span></div>
    <div style="font-family:'Instrument Sans',sans-serif;font-size:12px;color:var(--purple);margin-bottom:8px">Paste directly into your &lt;head&gt;. Drop the scripts you don't need — don't actually load all of these on one page.</div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button data-copy="${encodeURIComponent(allJs)}" data-name="Full CDN bundle" class="btn-dark" style="padding:6px 14px;font-size:10px">Copy all script tags</button></div>
    <div class="pip-block">${allJs.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
  `;
}

// ═══════════════════════════════════════════════════════
//  ROUTER
// ═══════════════════════════════════════════════════════
function showSection(sec){
  currentSection = sec;
  document.querySelectorAll('.s-item').forEach(i => {
    i.classList.toggle('active', i.dataset.section === sec);
  });
  if(sec === 'install-py') return renderInstallPy();
  if(sec === 'install-node') return renderInstallNode();
  if(sec === 'install-bundle') return renderInstallBundle();
  if(JS_LIBS[sec]) return renderJS(sec);
  if(PY_PKGS[sec]) return renderPY(sec);
}

// ═══════════════════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════════════════
function searchLibs(q){
  if(!q){ showSection(currentSection); return; }
  const term = q.toLowerCase();
  const match = (hay) => (hay||'').toLowerCase().includes(term);
  const jsResults = Object.entries(JS_LIBS).flatMap(([cat, libs]) =>
    libs.filter(l => match(l.name) || match(l.desc) || match(l.use) || (l.tags||[]).some(match) || (l.projects||[]).some(match))
      .map(l => ({...l, _cat:cat}))
  );
  const pyResults = Object.entries(PY_PKGS).flatMap(([cat, pkgs]) =>
    pkgs.filter(p => match(p.name) || match(p.desc) || match(p.use) || (p.projects||[]).some(match))
      .map(p => ({...p, _cat:cat}))
  );
  const color = '#1BA2D2';
  document.getElementById('content').innerHTML = `
    <div class="sec-hdr">
      <div class="sec-hdr-title">Search: "${q.replace(/[<>]/g,'')}"</div>
      <span class="sec-hdr-count">${jsResults.length + pyResults.length} results</span>
    </div>
    ${jsResults.length ? `
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--purple);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">JS Libraries (${jsResults.length})</div>
      <div class="lib-grid" style="margin-bottom:24px">
        ${jsResults.map((l,i) => jsCard(l, l._cat, CAT_COLORS[l._cat] || color, i)).join('')}
      </div>` : ''}
    ${pyResults.length ? `
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--purple);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Python Packages (${pyResults.length})</div>
      <div class="py-grid">
        ${pyResults.map((p,i) => pyCard(p, p._cat, CAT_COLORS[p._cat] || color, i)).join('')}
      </div>` : ''}
    ${!jsResults.length && !pyResults.length ? '<div style="text-align:center;padding:48px;color:var(--purple)">No results found</div>' : ''}
  `;
}

// ═══════════════════════════════════════════════════════
//  COPY + TOAST
// ═══════════════════════════════════════════════════════
function copyText(text, label){
  navigator.clipboard.writeText(text).then(() => {
    const t = document.getElementById('toast');
    t.textContent = (label || 'Copied') + ' ✓';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }).catch(err => {
    const t = document.getElementById('toast');
    t.textContent = 'Copy failed — check clipboard permissions';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  });
}

function copyAllPip(){
  const all = Object.values(PY_PKGS).flat().map(p=>p.name).join(' ');
  copyText('pip install ' + all, 'All pip packages');
}

// ═══════════════════════════════════════════════════════
//  SIDEBAR COUNTS
// ═══════════════════════════════════════════════════════
function updateCounts(){
  let total = 0;
  Object.entries(JS_LIBS).forEach(([k,v]) => {
    const el = document.getElementById('sc-'+k);
    if(el) el.textContent = v.length;
    total += v.length;
  });
  Object.entries(PY_PKGS).forEach(([k,v]) => {
    const el = document.getElementById('sc-'+k);
    if(el) el.textContent = v.length;
    total += v.length;
  });
  document.getElementById('total-count').textContent = total;
}

// ═══════════════════════════════════════════════════════
//  DELEGATED EVENT HANDLERS (no more inline onclick bombs)
// ═══════════════════════════════════════════════════════
document.addEventListener('click', e => {
  // Sidebar nav
  const sItem = e.target.closest('.s-item');
  if(sItem){ showSection(sItem.dataset.section); return; }
  // Project chips
  const chip = e.target.closest('.chip');
  if(chip){
    currentProject = chip.dataset.proj;
    document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c === chip));
    const q = document.getElementById('search').value;
    if(q) searchLibs(q); else showSection(currentSection);
    return;
  }
  // Favorite star
  const fav = e.target.closest('[data-fav]');
  if(fav){
    e.stopPropagation();
    const id = fav.dataset.fav;
    if(favs.has(id)){ favs.delete(id); fav.classList.remove('starred'); fav.textContent='☆'; }
    else { favs.add(id); fav.classList.add('starred'); fav.textContent='★'; }
    saveFavs();
    return;
  }
  // Copy CDN URL
  const cdnCopy = e.target.closest('[data-copy-cdn]');
  if(cdnCopy){
    const text = decodeURIComponent(cdnCopy.dataset.copyCdn);
    const snippet = text.startsWith('http') ? `<script src="${text}"></` + `script>` : text;
    copyText(snippet, cdnCopy.dataset.name);
    return;
  }
  // Copy arbitrary text
  const copyEl = e.target.closest('[data-copy]');
  if(copyEl){
    copyText(decodeURIComponent(copyEl.dataset.copy), copyEl.dataset.name);
    return;
  }
});

// ═══════════════════════════════════════════════════════
//  KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  const search = document.getElementById('search');
  // `/` to focus search (ignore if already typing in an input)
  if(e.key === '/' && document.activeElement !== search){
    e.preventDefault();
    search.focus();
    search.select();
  }
  // Esc to clear search
  if(e.key === 'Escape' && document.activeElement === search){
    search.value = '';
    searchLibs('');
    search.blur();
  }
});

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
updateCounts();
showSection('animation');
</script>
